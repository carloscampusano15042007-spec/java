<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<div id="root"></div>

<script type="text/babel">
    // Los mismos datos de arriba
    const platos = [
        { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
        { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
        { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
        { id: 4, nombre: "Pollo a la brasa", categoria: "segundos", precio: 20, stock: 4, disponible: true },
        { id: 5, nombre: "Jugo de naranja", categoria: "bebidas", precio: 5, stock: 8, disponible: true },
    ];


    function PlatoCard(props) {
        return (
            <div>
                <h3>{props.nombre}</h3>
                <p>Categoria: {props.categoria}</p>
                <p>Precio: {props.precio}</p>
                <p>Stock: {props.stock}</p>
                <p>Disponible:{props.disponible ? "✅ Disponible" : "❌ Agotado"}</p>
            </div>
        );
    }

    // ¿Cómo se llama la función? ¿Qué recibe? ¿Qué devuelve?
    function RenderCarta() {
        return (
            <>
                <h2>Carta</h2>

                {platos.map(plato => (
                    <div key={plato.id} className="plato">
                        <h3>Plato: {plato.nombre}</h3>
                        <p>Precio: {plato.precio}</p>
                        <p>Stock: {plato.stock}</p>
                        <p>{plato.disponible ? "✅ Disponible" : "❌ Agotado"}</p>
                    </div>
                ))}

            </>
        )
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(RenderCarta());
</script>
