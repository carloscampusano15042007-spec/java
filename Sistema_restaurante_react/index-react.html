<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<div id="root"></div>

<script type="text/babel">
    // Los mismos datos de arriba
    const platos = [
        { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
        { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
        { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
    ];

    // ¿Cómo se llama la función? ¿Qué recibe? ¿Qué devuelve?
    function renderCarta() {
        return (
            <>
                <h2>Carta</h2>

                {platos.map(plato => (
                    <div key={plato.id} className="plato">
                        <h3>Plato: {plato.nombre}</h3>
                        <p>Precio: {plato.precio}</p>
                        <p>Stock: {plato.stock}</p>
                        <p>{plato.disponible ? "✅ Disponible" : "❌ Agotado"}</p>
                    </div>
                ))}

            </>
        )
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(renderCarta());
</script>
